<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login do Cliente - Totem Interativo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .form-group input::placeholder {
            color: #aaa;
        }
        
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .info-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
        }
        
        .info-box p {
            color: #666;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .info-box strong {
            color: #333;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }
        
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        .senha-exemplo {
            background: #e8f4fd;
            border-radius: 5px;
            padding: 8px 12px;
            font-family: monospace;
            font-size: 14px;
            color: #0366d6;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🔊 Totem Interativo</h1>
            <p>Área do Cliente - Gerenciar Áudio</p>
        </div>
        
        <form action="/cliente/login" method="POST">
            <div class="form-group">
                <label for="totemId">ID do seu Totem</label>
                <input type="text" 
                       id="totemId" 
                       name="totemId" 
                       placeholder="Ex: TOTEM47" 
                       required 
                       autocomplete="off"
                       pattern="[A-Za-z0-9]+"
                       title="Apenas letras e números">
            </div>
            
            <div class="form-group">
                <label for="senha">Senha de Acesso</label>
                <input type="password" 
                       id="senha" 
                       name="senha" 
                       placeholder="Digite sua senha" 
                       required>
            </div>
            
            <button type="submit" class="btn-login">🔓 Acessar Dashboard</button>
        </form>
        
        <div class="info-box">
            <p><strong>🔐 Primeiro acesso?</strong></p>
            <p>Sua senha é composta pelos <strong>últimos 4 dígitos do ID + 2026</strong></p>
            <p>Exemplo para <strong>TOTEM47</strong>:</p>
            <div class="senha-exemplo">senha: 47472026</div>
            <p style="margin-top: 10px; font-size: 12px;">⚠️ Por segurança, altere sua senha após o primeiro acesso.</p>
        </div>
        
        <div class="footer">
            <p><a href="/admin/login">Área Administrativa</a> | Totem Interativo v4.0</p>
        </div>
    </div>
    
    <script>
        // Adicionar exemplo automático quando digitar no campo ID
        document.getElementById('totemId').addEventListener('input', function(e) {
            const id = e.target.value;
            if (id.length >= 4) {
                const ultimos4 = id.slice(-4);
                const exemplo = document.querySelector('.senha-exemplo');
                if (exemplo) {
                    exemplo.textContent = `senha: ${ultimos4}2026`;
                }
            }
        });
    </script>
</body>
</html>
