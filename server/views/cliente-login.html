<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Pixel · Login do Cliente</title>
    <!-- Fontes e ícones -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0b0f18;
            --bg-card: rgba(18, 25, 40, 0.8);
            --accent: #4f83f5;
            --accent-glow: rgba(79, 131, 245, 0.4);
            --text-primary: #f0f4ff;
            --text-secondary: #a0b3d9;
            --text-muted: #5f73a1;
            --input-bg: rgba(0, 0, 0, 0.3);
            --input-border: rgba(79, 131, 245, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 30% 30%, #1a263a, #0b0f18);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-primary);
            backdrop-filter: blur(2px);
        }

        .login-container {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(79, 131, 245, 0.25);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(79, 131, 245, 0.1) inset;
            width: 100%;
            max-width: 420px;
            padding: 40px 35px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .login-container:hover {
            box-shadow: 0 30px 60px -15px black, 0 0 0 1px var(--accent) inset;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo i {
            font-size: 3rem;
            color: var(--accent);
            filter: drop-shadow(0 0 15px var(--accent-glow));
            margin-bottom: 10px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #bdd3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 28px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group label i {
            color: var(--accent);
            margin-right: 6px;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 16px 18px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 24px;
            font-size: 1rem;
            color: white;
            transition: all 0.2s;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 131, 245, 0.2), 0 0 15px var(--accent-glow);
            background: rgba(0, 0, 0, 0.5);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
            font-size: 0.9rem;
            opacity: 0.6;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent), #6d9bff);
            color: #0b0f18;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.3px;
            box-shadow: 0 8px 20px -5px var(--accent-glow);
        }

        .btn-login i {
            font-size: 1.1rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px var(--accent-glow);
            filter: brightness(1.1);
        }

        .btn-login:active {
            transform: translateY(1px);
            box-shadow: 0 5px 15px -5px var(--accent-glow);
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid rgba(79, 131, 245, 0.15);
            padding-top: 20px;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: #8bb0ff;
            text-decoration: underline;
        }

        .footer i {
            font-size: 0.7rem;
            margin: 0 4px;
            color: var(--text-muted);
        }

        /* Dica sutil de segurança */
        .security-hint {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 0.7rem;
            margin-top: 15px;
        }

        .security-hint i {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-print"></i>
            <h1>Print Pixel</h1>
            <p>Acesse seu painel de controle</p>
        </div>
        
        <!-- Mantendo o método POST e action original -->
        <form action="/cliente/login" method="POST">
            <div class="form-group">
                <label for="totemId">
                    <i class="fas fa-hashtag"></i> ID do Totem
                </label>
                <input type="text" 
                       id="totemId" 
                       name="totemId" 
                       placeholder="Ex: TOTEM47" 
                       required 
                       autocomplete="off"
                       pattern="[A-Za-z0-9]+"
                       title="Apenas letras e números">
            </div>
            
            <button type="submit" class="btn-login">
                <i class="fas fa-arrow-right-to-bracket"></i> Acessar Dashboard
            </button>
        </form>
        
        <div class="footer">
            <p>
                <a href="/admin/login"><i class="fas fa-shield-alt"></i> Área Administrativa</a> 
                <span style="margin:0 8px">|</span> 
                <span>v4.0</span>
            </p>
        </div>

        <div class="security-hint">
            <i class="fas fa-lock"></i> Conexão segura • Apenas letras e números
        </div>
    </div>
</body>
</html>
